name = "wealth-ai-advisor"
main = "src/index.ts"
compatibility_date = "2024-09-01"

# Cloudflare Workers AI binding
ai_account_id = "<YOUR_ACCOUNT_ID>"
bindings = [
  { name = "AI", type = "ai" }
]

# Routes - adjust domain as needed
routes = [
  { pattern = "ai.your-domain.workers.dev", zone_name = "your-domain.com" }
]

# Environment variables (set in Cloudflare dashboard or .dev.vars)
vars = { }
